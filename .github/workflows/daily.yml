name: 每日自动更新

on:
  schedule:
    # 每天 09:00 CST (UTC+8 = 01:00 UTC)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行 HelloDaily
        run: python3 hellodaily.py

      - name: 提交并推送
        run: |
          git config user.name "HelloDaily Bot"
          git config user.email "bot@hellodaily.dev"
          git add -A
          # 如果有变更才提交
          if git diff --cached --quiet; then
            echo "没有新内容，跳过提交"
          else
            git commit -m "📅 每日自动更新 $(date +'%Y-%m-%d')"
            git push
          fi
